<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小亮实验室 HTML PPT 模板</title>
<style>
  :root {
    --paper: #fff4dc;
    --paper-soft: #fff9ea;
    --ink: #201b17;
    --muted: #685f55;
    --tomato: #f35b3f;
    --mustard: #f2c84b;
    --mint: #8bd6af;
    --green: #a9d66f;
    --line: 4px solid var(--ink);
    --shadow: 9px 9px 0 var(--ink);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
  body {
    color: var(--ink);
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    background:
      linear-gradient(rgba(32,27,23,.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(32,27,23,.045) 1px, transparent 1px),
      var(--paper);
    background-size: 30px 30px;
  }
  .deck { width: 100vw; height: 100vh; display: grid; place-items: center; padding: 20px; }
  .slide {
    display: none;
    position: relative;
    width: min(calc(100vw - 44px), calc((100vh - 44px) * 16 / 9));
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border: var(--line);
    border-radius: 24px;
    background:
      linear-gradient(rgba(32,27,23,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(32,27,23,.035) 1px, transparent 1px),
      var(--paper-soft);
    background-size: 26px 26px;
    box-shadow: var(--shadow);
    padding: 46px 56px 42px;
  }
  body.aspect-16x9 .slide {
    width: min(calc(100vw - 44px), calc((100vh - 44px) * 16 / 9));
    aspect-ratio: 16 / 9;
  }
  body.aspect-3x4 .deck { padding: 18px; }
  body.aspect-3x4 .slide {
    width: min(calc(100vw - 44px), calc((100vh - 44px) * 3 / 4));
    aspect-ratio: 3 / 4;
    padding: 42px 38px 38px;
  }
  .slide::before,
  .slide::after {
    content: "";
    position: absolute;
    pointer-events: none;
    z-index: 0;
  }
  .slide::before {
    width: 70px;
    height: 70px;
    right: 38px;
    top: 34px;
    border: 3px solid var(--ink);
    border-radius: 50%;
    background: var(--mustard);
    box-shadow: 5px 5px 0 var(--ink);
    transform: rotate(4deg);
  }
  .slide::after {
    left: 42px;
    bottom: 48px;
    width: 88px;
    height: 30px;
    border: 3px solid var(--ink);
    border-radius: 999px;
    background: var(--mint);
    box-shadow: 5px 5px 0 var(--ink);
    transform: rotate(-5deg);
  }
  .slide.active { display: block; }
  .slide > * { position: relative; z-index: 1; }
  .pin { position: absolute; left: 28px; top: 20px; transform: rotate(-2deg); padding: 7px 14px; border: 3px solid var(--ink); border-radius: 999px; background: var(--mustard); font-weight: 950; }
  .mark { display: inline-flex; padding: 8px 14px; border: 3px solid var(--ink); border-radius: 999px; background: var(--mint); font-weight: 950; }
  h1, h2, p { margin: 0; }
  h2 { margin-top: 28px; font-size: 56px; line-height: 1.08; }
  body.aspect-3x4 h2 { margin-top: 22px; font-size: 46px; line-height: 1.06; }
  .lead { margin-top: 18px; color: var(--muted); font-size: 25px; line-height: 1.42; font-weight: 750; }
  body.aspect-3x4 .lead { font-size: 22px; line-height: 1.42; }
  .accent { color: var(--tomato); }
  .layout { height: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 36px; align-items: center; }
  .layout.image-wide { grid-template-columns: minmax(390px, .72fr) minmax(650px, 1.28fr); }
  .layout.image-step { grid-template-columns: minmax(460px, .9fr) minmax(560px, 1.1fr); }
  .layout.duo { grid-template-columns: minmax(420px, .86fr) minmax(600px, 1.14fr); }
  .duo-stack { display: grid; gap: 24px; align-content: center; }
  .duo-stack .shot img { max-height: 285px; }
  .text-stack { display: grid; height: 100%; align-content: center; gap: 22px; }
  .card-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; margin-top: 24px; }
  .info-card { border: 3px solid var(--ink); border-radius: 18px; background: #fff; box-shadow: 6px 6px 0 var(--ink); padding: 18px 20px; }
  .info-card b { display: block; font-size: 23px; line-height: 1.2; }
  .info-card p { margin-top: 8px; color: var(--muted); font-size: 18px; line-height: 1.38; font-weight: 700; }
  .checklist { display: grid; gap: 13px; margin-top: 24px; }
  .check-row { display: grid; grid-template-columns: 34px 1fr; gap: 12px; align-items: start; padding: 14px 16px; border: 3px solid var(--ink); border-radius: 16px; background: #fff; box-shadow: 5px 5px 0 var(--ink); font-size: 21px; line-height: 1.35; font-weight: 850; }
  .check-row::before { content: "✓"; display: grid; place-items: center; width: 30px; height: 30px; border: 3px solid var(--ink); border-radius: 50%; background: var(--green); font-weight: 950; }
  .vertical-card { height: 100%; display: grid; align-content: center; gap: 22px; }
  .vertical-cover { height: 100%; display: grid; grid-template-rows: auto 1fr auto; gap: 22px; }
  .vertical-cover h2 { font-size: 58px; line-height: 1; }
  .cover-visual { align-self: end; }
  .cover-visual .shot img { max-height: 360px; }
  .quote-card { height: 100%; display: grid; place-items: center; text-align: center; }
  .quote-mark { display: inline-grid; place-items: center; width: 64px; height: 64px; margin: 0 auto 18px; border: var(--line); border-radius: 50%; background: var(--mustard); box-shadow: 6px 6px 0 var(--ink); font-size: 42px; font-weight: 950; }
  .quote-card h2 { margin-top: 0; font-size: 54px; line-height: 1.05; }
  .stacked-card { height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 22px; align-items: center; }
  .stacked-card.image-first { grid-template-rows: minmax(0, 1fr) auto; }
  .stacked-card .shot { align-self: center; }
  .stacked-card .shot img { max-height: 420px; }
  .vertical-stepper { display: grid; gap: 14px; margin-top: 18px; }
  .vertical-stepper .step-row { grid-template-columns: 46px 1fr; padding: 16px 17px; }
  .vertical-stepper .step-row b { font-size: 23px; }
  .vertical-stepper .step-row p { font-size: 18px; }
  .shot { position: relative; border: var(--line); border-radius: 20px; background: #fff; box-shadow: 8px 8px 0 var(--ink); padding: 10px; cursor: zoom-in; }
  .shot img { display: block; width: 100%; height: auto; max-height: 600px; object-fit: contain; border: 3px solid var(--ink); border-radius: 13px; background: #f2f2f2; }
  .shot.missing-image { min-height: 190px; display: grid; place-items: center; }
  .shot.missing-image::before { content: "替换为本地图片"; display: grid; place-items: center; min-height: 150px; width: 100%; border: 3px dashed var(--ink); border-radius: 13px; background: #fff8e8; color: var(--muted); font-size: 22px; font-weight: 950; }
  .shot.missing-image img { display: none; }
  .caption { position: absolute; left: 24px; bottom: -15px; padding: 8px 13px; border: 3px solid var(--ink); border-radius: 12px; background: var(--tomato); color: white; font-weight: 950; }
  .stepper { display: grid; gap: 12px; margin-top: 20px; }
  .step-row { display: grid; grid-template-columns: 42px 1fr; gap: 12px; align-items: start; padding: 13px 15px; border: 3px solid var(--ink); border-radius: 15px; background: #fff; box-shadow: 4px 4px 0 var(--ink); }
  .step-row:nth-child(2n) { background: #fff0ca; }
  .step-badge { display: grid; place-items: center; width: 34px; height: 34px; border: 3px solid var(--ink); border-radius: 50%; background: var(--tomato); color: white; font-weight: 950; }
  .step-row b { display: block; font-size: 22px; line-height: 1.2; }
  .step-row p { margin: 5px 0 0; color: var(--muted); font-size: 17px; line-height: 1.35; font-weight: 700; }
  .footer { position: absolute; left: 30px; right: 30px; bottom: 16px; display: flex; justify-content: space-between; color: var(--muted); font-size: 14px; font-weight: 900; }
  .progress { position: fixed; left: 24px; right: 24px; bottom: 9px; height: 10px; border: 2px solid var(--ink); border-radius: 999px; background: white; z-index: 20; }
  .progress span { display: block; width: 0; height: 100%; border-radius: 999px; background: var(--tomato); transition: width .16s ease; }
  .overview { display: none; position: fixed; inset: 0; z-index: 50; overflow: auto; padding: 34px; background: rgba(255,244,220,.96); }
  .overview.open { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; }
  .overview-card { min-height: 128px; text-align: left; border: var(--line); border-radius: 18px; background: #fffdf4; box-shadow: 7px 7px 0 var(--ink); padding: 16px; color: var(--ink); cursor: pointer; font: inherit; }
  .overview-card b { display: inline-grid; place-items: center; min-width: 42px; height: 34px; margin-bottom: 12px; border: 3px solid var(--ink); border-radius: 999px; background: var(--mustard); font-size: 18px; }
  .overview-card span { display: block; font-size: 18px; line-height: 1.3; font-weight: 900; }
  .overview-card:hover { transform: translate(-2px, -2px); box-shadow: 9px 9px 0 var(--ink); }
  .zoom-viewer { position: fixed; inset: 0; z-index: 80; display: grid; place-items: center; padding: 34px; background: rgba(32,27,23,.42); opacity: 0; visibility: hidden; pointer-events: none; transition: opacity .16s ease, visibility .16s ease; }
  .zoom-viewer.slide-bound {
    inset: auto;
    left: var(--zoom-left, 0px);
    top: var(--zoom-top, 0px);
    width: var(--zoom-width, 100vw);
    height: var(--zoom-height, 100vh);
    padding: 24px;
    border-radius: 24px;
    overflow: hidden;
  }
  .zoom-viewer.open { opacity: 1; visibility: visible; pointer-events: auto; }
  .zoom-frame { max-width: min(94vw, 1500px); max-height: 88vh; padding: 14px; border: var(--line); border-radius: 22px; background: #fffdf4; box-shadow: 12px 12px 0 var(--ink); opacity: 0; transform: rotate(-.4deg) scale(.965); transition: opacity .16s ease, transform .18s cubic-bezier(.2,.8,.2,1); }
  .zoom-viewer.slide-bound .zoom-frame {
    max-width: calc(var(--zoom-width, 100vw) - 64px);
    max-height: calc(var(--zoom-height, 100vh) - 64px);
  }
  .zoom-viewer.open .zoom-frame { opacity: 1; transform: rotate(-.4deg) scale(1); }
  .zoom-frame img { display: block; max-width: calc(94vw - 42px); max-height: calc(88vh - 42px); object-fit: contain; }
  .zoom-viewer.slide-bound .zoom-frame img {
    max-width: calc(var(--zoom-width, 100vw) - 106px);
    max-height: calc(var(--zoom-height, 100vh) - 106px);
  }
</style>
</head>
<!-- 只切换 aspect class 来选择横版课件或竖版卡片。公开模板固定使用小亮实验室风格。 -->
<body class="style-xiaoliang-lab aspect-16x9">
<main class="deck" id="deck"></main>
<div class="progress"><span id="bar"></span></div>
<div class="overview" id="overview"></div>
<div class="zoom-viewer" id="zoomViewer" aria-hidden="true"><div class="zoom-frame"><img id="zoomImage" alt=""></div></div>
<script>
const deckSlides = [
  {
    section: "小亮实验室",
    title: "示例页",
    layout: "image",
    tag: "小亮风格 HTML PPT",
    headline: "把文章做成<span class='accent'>可录屏讲解</span>的 PPT",
    lead: "替换 slides 数组和图片路径即可。",
    image: "images/example.png",
    caption: "示例图片"
  },
  {
    section: "步骤演示",
    title: "步骤 + 图片示例",
    layout: "imageStep",
    tag: "纵向步骤条",
    headline: "长中文步骤不要挤进横向小卡片",
    steps: [
      ["先看左侧分类", "说明这一步要让观众注意什么，文字可以自然换行。"],
      ["再看右侧截图", "截图框按原图比例包裹，不用固定高度撑出大块空白。"]
    ],
    image: "images/example.png",
    caption: "按原图比例显示"
  },
  {
    section: "结构拆解",
    title: "文字卡片示例",
    layout: "text",
    tag: "结构化讲解",
    headline: "把一个概念拆成<span class='accent'>可理解的卡片</span>",
    lead: "适合解释原则、误区、判断标准和阶段总结。",
    cards: [
      ["先给判断", "这一页只讲一个清晰结论。"],
      ["再给例子", "用真实界面或操作语境支撑它。"],
      ["最后给动作", "告诉观众下一步应该看哪里。"],
      ["避免空话", "不要只写提升效率、方便协作。"]
    ]
  }
];
const cardSlides = [
  {
    section: "图文 01",
    title: "3:4 封面示例",
    layout: "coverVertical",
    tag: "3:4 图文卡片",
    headline: "把教程变成<span class='accent'>可发布</span>的图文卡片",
    lead: "适合小红书、公众号配图和朋友圈图文。每页都要能独立读懂。",
    image: "images/example.png",
    caption: "主视觉或关键截图"
  },
  {
    section: "图文 02",
    title: "观点卡示例",
    layout: "quoteCard",
    tag: "核心判断",
    headline: "3:4 不是横版 PPT 的裁剪版",
    lead: "它要重新组织信息：更强标题、更短正文、更聚焦的截图。"
  },
  {
    section: "图文 03",
    title: "图文堆叠示例",
    layout: "stackedImage",
    tag: "截图聚焦",
    headline: "一张卡只讲一个界面重点",
    lead: "不要塞完整桌面截图，优先展示观众此刻需要看的区域。",
    image: "images/example.png",
    caption: "聚焦截图"
  },
  {
    section: "图文 04",
    title: "竖向步骤示例",
    layout: "verticalSteps",
    tag: "行动路径",
    headline: "把流程拆成能扫读的竖向步骤",
    steps: [
      ["先抛出判断", "这一页让读者知道为什么要继续看。"],
      ["再给具体动作", "每一步都要能在手机屏幕上轻松读完。"],
      ["最后给下一步", "用总结卡或行动卡收束整组图文。"]
    ]
  }
];
const params = new URLSearchParams(location.search);
if (params.get("mode") === "cards" || params.get("aspect") === "3x4") {
  document.body.classList.remove("aspect-16x9");
  document.body.classList.add("aspect-3x4");
}
if (params.get("mode") === "deck" || params.get("aspect") === "16x9") {
  document.body.classList.remove("aspect-3x4");
  document.body.classList.add("aspect-16x9");
}
const slides = document.body.classList.contains("aspect-3x4") ? cardSlides : deckSlides;
const deck = document.querySelector("#deck");
const bar = document.querySelector("#bar");
const overview = document.querySelector("#overview");
const zoomViewer = document.querySelector("#zoomViewer");
const zoomImage = document.querySelector("#zoomImage");
const zoomFrame = document.querySelector(".zoom-frame");
let index = 0;
let zoomCloseTimer = 0;
let touchStartX = 0;
let touchStartY = 0;

function escapeHTML(value) {
  return String(value ?? "").replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[char]));
}
function renderIntro(s) {
  return `<div><span class="mark">${s.tag}</span><h2>${s.headline}</h2>${s.lead ? `<p class="lead">${s.lead}</p>` : ""}</div>`;
}
function renderShot(image, caption = "") {
  if (!image) return "";
  return `<div class="shot"><img src="${escapeHTML(image)}" alt="" onerror="this.parentElement.classList.add('missing-image')"><span class="caption">${escapeHTML(caption)}</span></div>`;
}
function renderCards(cards = []) {
  return `<div class="card-grid">${cards.map(card => `<div class="info-card"><b>${escapeHTML(card[0])}</b><p>${escapeHTML(card[1])}</p></div>`).join("")}</div>`;
}
function renderChecks(items = []) {
  return `<div class="checklist">${items.map(item => `<div class="check-row">${escapeHTML(item)}</div>`).join("")}</div>`;
}
function renderStepRows(steps = []) {
  return `<div class="stepper">${steps.map((step, n) => `<div class="step-row"><span class="step-badge">${n + 1}</span><div><b>${escapeHTML(step[0])}</b><p>${escapeHTML(step[1])}</p></div></div>`).join("")}</div>`;
}
function renderVerticalStepRows(steps = []) {
  return `<div class="vertical-stepper">${steps.map((step, n) => `<div class="step-row"><span class="step-badge">${n + 1}</span><div><b>${escapeHTML(step[0])}</b><p>${escapeHTML(step[1])}</p></div></div>`).join("")}</div>`;
}
function renderSlide(s, i) {
  const text = renderIntro(s);
  const shot = renderShot(s.image, s.caption);
  let body = "";
  if (s.layout === "coverVertical") {
    body = `<div class="vertical-cover"><div><span class="mark">${s.tag}</span><h2>${s.headline}</h2>${s.lead ? `<p class="lead">${s.lead}</p>` : ""}</div><div></div><div class="cover-visual">${shot}</div></div>`;
  } else if (s.layout === "quoteCard") {
    body = `<div class="quote-card"><div><span class="quote-mark">“</span><span class="mark">${s.tag}</span><h2>${s.headline}</h2>${s.lead ? `<p class="lead">${s.lead}</p>` : ""}</div></div>`;
  } else if (s.layout === "stackedImage") {
    const imageFirst = s.imageFirst ? " image-first" : "";
    body = `<div class="stacked-card${imageFirst}">${s.imageFirst ? `${shot}${text}` : `${text}${shot}`}</div>`;
  } else if (s.layout === "verticalSteps") {
    body = `<div class="vertical-card"><div><span class="mark">${s.tag}</span><h2>${s.headline}</h2>${s.lead ? `<p class="lead">${s.lead}</p>` : ""}${renderVerticalStepRows(s.steps)}</div></div>`;
  } else if (s.layout === "imageStep") {
    body = `<div class="layout image-step"><div><span class="mark">${s.tag}</span><h2>${s.headline}</h2>${s.lead ? `<p class="lead">${s.lead}</p>` : ""}${renderStepRows(s.steps)}</div>${shot}</div>`;
  } else if (s.layout === "imageWide") {
    body = `<div class="layout image-wide">${text}${shot}</div>`;
  } else if (s.layout === "duo") {
    const shots = (s.images || []).map(item => renderShot(item.src || item.image, item.caption)).join("");
    body = `<div class="layout duo">${text}<div class="duo-stack">${shots}</div></div>`;
  } else if (s.layout === "text") {
    const details = s.cards ? renderCards(s.cards) : renderChecks(s.checks || []);
    body = `<div class="text-stack">${text}${details}</div>`;
  } else if (s.layout === "steps") {
    body = `<div class="text-stack"><span class="mark">${s.tag}</span><h2>${s.headline}</h2>${s.lead ? `<p class="lead">${s.lead}</p>` : ""}${renderStepRows(s.steps)}</div>`;
  } else {
    body = `<div class="layout">${text}${shot}</div>`;
  }
  return `<section class="slide" data-title="${escapeHTML(s.title)}"><div class="pin">${escapeHTML(s.section)}</div>${body}<div class="footer"><span>小亮实验室 HTML PPT</span><span>${i + 1} / ${slides.length}</span></div></section>`;
}
deck.innerHTML = slides.map(renderSlide).join("");
const slideEls = [...document.querySelectorAll(".slide")];

function readHashIndex() {
  const match = location.hash.match(/^#\/(\d+)$/);
  if (!match) return 0;
  return Math.max(0, Math.min(slideEls.length - 1, Number(match[1]) - 1));
}
function renderOverview() {
  overview.innerHTML = slides.map((slide, i) => `
    <button class="overview-card" type="button" data-index="${i}">
      <b>${i + 1}</b>
      <span>${escapeHTML(slide.title || slide.headline || `第 ${i + 1} 页`)}</span>
    </button>
  `).join("");
  overview.querySelectorAll(".overview-card").forEach(button => {
    button.addEventListener("click", () => {
      overview.classList.remove("open");
      go(Number(button.dataset.index));
    });
  });
}
function render() {
  slideEls.forEach((slide, i) => slide.classList.toggle("active", i === index));
  bar.style.width = `${((index + 1) / slideEls.length) * 100}%`;
  history.replaceState(null, "", `${location.pathname}${location.search}#/${index + 1}`);
}
function closeZoom() {
  clearTimeout(zoomCloseTimer);
  zoomViewer.classList.remove("open");
  zoomViewer.setAttribute("aria-hidden", "true");
}
function closeOverlays() {
  overview.classList.remove("open");
  closeZoom();
}
function go(next) {
  index = Math.max(0, Math.min(slideEls.length - 1, next));
  closeZoom();
  render();
}
function bindImageZoom() {
  function applyZoomBounds() {
    const isCards = document.body.classList.contains("aspect-3x4");
    zoomViewer.classList.toggle("slide-bound", isCards);
    if (!isCards) return;
    const rect = slideEls[index].getBoundingClientRect();
    zoomViewer.style.setProperty("--zoom-left", `${rect.left}px`);
    zoomViewer.style.setProperty("--zoom-top", `${rect.top}px`);
    zoomViewer.style.setProperty("--zoom-width", `${rect.width}px`);
    zoomViewer.style.setProperty("--zoom-height", `${rect.height}px`);
  }
  document.querySelectorAll(".shot img").forEach(image => {
    image.addEventListener("mouseenter", () => {
      clearTimeout(zoomCloseTimer);
      applyZoomBounds();
      zoomImage.src = image.currentSrc || image.src;
      zoomViewer.classList.add("open");
      zoomViewer.setAttribute("aria-hidden", "false");
    });
  });
  zoomFrame.addEventListener("mouseenter", () => clearTimeout(zoomCloseTimer));
  zoomViewer.addEventListener("mousemove", event => {
    if (zoomViewer.classList.contains("open") && !zoomFrame.contains(event.target)) {
      clearTimeout(zoomCloseTimer);
      zoomCloseTimer = setTimeout(() => {
        closeZoom();
      }, 110);
    }
  });
  zoomViewer.addEventListener("click", () => {
    closeZoom();
  });
}
document.addEventListener("keydown", event => {
  if (event.altKey || event.ctrlKey || event.metaKey) return;
  if (event.key === "ArrowRight" || event.key === " " || event.key === "PageDown") go(index + 1);
  if (event.key === "ArrowLeft" || event.key === "PageUp") go(index - 1);
  if (event.key === "Home") go(0);
  if (event.key === "End") go(slideEls.length - 1);
  if (event.key.toLowerCase() === "o") overview.classList.toggle("open");
  if (event.key.toLowerCase() === "f") document.documentElement.requestFullscreen?.();
  if (event.key === "Escape") {
    closeOverlays();
  }
});
window.addEventListener("hashchange", () => {
  index = readHashIndex();
  render();
});
let lastWheelAt = 0;
document.addEventListener("wheel", event => {
  if (overview.classList.contains("open") || zoomViewer.classList.contains("open")) return;
  const now = Date.now();
  if (now - lastWheelAt < 520 || Math.abs(event.deltaY) < 18) return;
  lastWheelAt = now;
  go(index + (event.deltaY > 0 ? 1 : -1));
}, { passive: true });
deck.addEventListener("pointerdown", event => {
  if (overview.classList.contains("open") || zoomViewer.classList.contains("open")) return;
  if (event.target.closest(".shot")) return;
  touchStartX = event.clientX;
  touchStartY = event.clientY;
});
deck.addEventListener("pointerup", event => {
  if (!touchStartX && !touchStartY) return;
  const dx = event.clientX - touchStartX;
  const dy = event.clientY - touchStartY;
  touchStartX = 0;
  touchStartY = 0;
  if (Math.abs(dx) < 72 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
  go(index + (dx < 0 ? 1 : -1));
});
index = readHashIndex();
renderOverview();
bindImageZoom();
render();
</script>
</body>
</html>
